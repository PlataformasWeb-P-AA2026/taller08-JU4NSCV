version: '3.8'

services:
  mysql_taller:
    image: mysql:8.0
    container_name: orm_mysql_taller
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: paises        # Crea la BD automáticamente en MySQL
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"                 # Tu PC hablará con este MySQL usando el puerto 3307
    volumes:
      - ./data/mysql_docker:/var/lib/mysql

  mariadb_taller:
    image: mariadb:11
    container_name: orm_mariadb_taller
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: paises      # Crea la BD automáticamente en MariaDB
      MARIADB_USER: user
      MARIADB_PASSWORD: password
    ports:
      - "3308:3306"                 # Tu PC hablará con este MariaDB usando el puerto 3308
    volumes:
      - ./data/mariadb_docker:/var/lib/mysql